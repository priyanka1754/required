<div class="container mx-auto p-4 mt-20">
  <!-- Title -->
  <h1 class="text-3xl font-bold mt-4">{{ blog?.title }}</h1>

  <!-- Author & Date -->
  <div
    class="flex flex-col sm:flex-row sm:items-center sm:justify-between mt-2 mb-4 gap-2"
  >
    <p class="text-gray-600 text-sm">
      By <span class="font-semibold text-blue-700">{{ blog?.author }}</span>
      <span class="mx-2">|</span>
      <span class="italic">{{ blog?.createdAt | date : "mediumDate" }}</span>
    </p>
  </div>

  <!-- Image -->
  <div *ngIf="blog?.imageUrl" class="flex justify-center my-6">
    <img
      [src]="blog?.imageUrl"
      alt="Blog Image"
      class="rounded-lg shadow-lg max-h-96 object-cover w-full sm:w-3/4 md:w-2/3 lg:w-1/2 border border-gray-200"
    />
  </div>

  <!-- Intro -->
  <div class="bg-blue-50 border-l-4 border-blue-400 p-4 rounded mb-6">
    <div
      class="intro-content text-lg font-medium text-blue-900 break-words whitespace-normal"
      [innerHTML]="blog?.safeIntro"
    ></div>
  </div>

  <!-- Content -->
  <div
    class="blog-content break-words whitespace-normal text-base leading-relaxed text-gray-800 mb-8 max-w-4xl"
    [innerHTML]="blog?.safeContent"
  ></div>

  <!-- Like & Dislike Buttons -->
  <div class="flex gap-4 mt-4 mb-8">
    <button
      (click)="likeBlog()"
      class="bg-green-500 text-white px-5 py-2 rounded shadow hover:bg-green-600 transition"
    >
      👍 {{ blog?.likes }}
    </button>
    <!-- <button
      (click)="dislikeBlog()"
      class="bg-red-500 text-white px-5 py-2 rounded shadow hover:bg-red-600 transition"
    >
      👎 {{ blog?.dislikes }}
    </button> -->
  </div>

  <h2 class="text-xl font-semibold mt-6 mb-2 text-blue-800">More reading...</h2>
  <ul class="space-y-2">
    <li
      *ngFor="let otherBlog of otherBlogs"
      (click)="openBlog(otherBlog.blogId)"
      class="cursor-pointer hover:text-blue-600 transition"
    >
      {{ otherBlog.title }}
    </li>
  </ul>
</div>
