<div class="px-2 mt-20">
  <!-- Top Write Blog Button -->
  <div class="flex justify-end mb-4">
    <button
      (click)="navigateToWriteBlog()"
      class="bg-blue-500 text-white px-4 py-2 rounded-md shadow-md hover:bg-blue-600"
    >
      Write Blog
    </button>
  </div>

  <div class="container mx-auto p-4 max-w-7xl">
    <!-- Blog List -->
    <div class="flex flex-wrap -mx-2">
      <div
        *ngFor="let blog of blogs"
        class="w-full sm:w-1/2 lg:w-1/3 px-2 mb-6 flex"
      >
        <div
          class="bg-white rounded-xl ring-1 ring-gray-200 hover:bg-blue-50 transition flex flex-col w-full h-full group overflow-hidden"
        >
          <div class="relative w-full aspect-[4/3] bg-gray-100">
            <img
              *ngIf="blog.imageUrl"
              [src]="blog.imageUrl"
              alt="Blog Image"
              class="absolute inset-0 w-full h-full object-cover object-center rounded-t-xl"
            />
          </div>
          <div class="p-5 flex flex-col flex-1">
            <h3
              class="text-lg font-bold mb-1 group-hover:text-blue-700 transition"
            >
              {{ blog.title }}
            </h3>
            <span
              class="text-gray-600 text-sm mb-2 line-clamp-2"
              [innerHTML]="blog.intro"
            ></span>
            <div class="flex items-center gap-2 mb-2">
              <span class="text-gray-500 text-xs">By {{ blog.author }}</span>
              <button 
                (click)="editBlog(blog)" 
                class="ml-auto flex items-center justify-center w-8 h-8 rounded-full bg-yellow-100 hover:bg-yellow-200 border border-yellow-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 transition"
                title="Edit"
              >
                <i class="fa-solid fa-pen-to-square text-yellow-700 text-base"></i>
              </button>
              <button 
                (click)="deleteBlog(blog)" 
                class="flex items-center justify-center w-8 h-8 rounded-full bg-red-100 hover:bg-red-200 border border-red-400 shadow-sm focus:outline-none focus:ring-2 focus:ring-red-400 transition"
                title="Delete"
              >
                <i class="fa-solid fa-trash text-red-700 text-base"></i>
              </button>
            </div>
            <button
              (click)="viewBlogDetails(blog.blogId)"
              class="text-blue-600 font-medium mt-auto inline-block hover:underline focus:outline-none"
            >
              Read More
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
